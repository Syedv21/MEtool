<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Daily Production History</title>
</head>
<body class="bg-slate-950 text-slate-200 p-10 font-sans">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10 border-b border-slate-800 pb-8">
            <h1 class="text-2xl font-black text-emerald-500 italic uppercase">Daily <span class="text-slate-500 not-italic">Production</span></h1>
            <div class="flex gap-4">
                <a href="/" class="text-slate-500 hover:text-emerald-400 text-[10px] font-black uppercase tracking-widest transition flex items-center mr-4">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Back to OCR
                </a>
                <button onclick="window.close()" class="bg-slate-800 px-6 py-2 rounded-lg font-bold text-xs hover:bg-slate-700 transition uppercase">Close Tab</button>
            </div>
        </div>

        <div class="bg-slate-900 rounded-2xl border border-slate-800 shadow-2xl overflow-hidden">
            <div class="p-4 border-b border-slate-800 bg-slate-800/20 flex justify-between items-center">
                <span class="text-[10px] font-black uppercase text-slate-500 tracking-widest">Global Agent Feed (Google Drive)</span>
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Search Agent or Date..."
                    class="bg-slate-950 border border-slate-700 rounded px-4 py-1 text-[10px] text-emerald-400 outline-none focus:border-emerald-500 w-64">
            </div>

            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-800/50 text-slate-500 text-[10px] uppercase font-black tracking-widest">
                    <tr>
                        <th class="p-6">Agent / Workspace</th>
                        <th class="p-6">Filename</th>
                        <th class="p-6 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="list" class="divide-y divide-slate-800">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        async function load() {
            const tbody = document.getElementById('list');
            tbody.innerHTML = `<tr><td colspan="3" class="p-10 text-center text-slate-600 animate-pulse uppercase font-black text-xs">Syncing with G: Drive...</td></tr>`;

            try {
                const res = await fetch('/list_files');
                const data = await res.json();
                tbody.innerHTML = "";

                if(!data.files || data.files.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" class="p-10 text-center text-slate-600 font-bold text-xs uppercase italic">No production files found in G: Drive</td></tr>`;
                    return;
                }

                data.files.forEach(f => {
    const tr = document.createElement('tr');
    tr.className = "hover:bg-slate-800/30 transition border-b border-slate-800/50";

    // Path for download: User5/Maaz/2026-03-27.xlsx
    const fullPath = `${f.folder}/${f.filename}`;

    tr.innerHTML = `
        <td class="p-6">
            <div class="text-emerald-500 font-black text-[10px] uppercase tracking-widest">${f.folder}</div>
            <div class="text-slate-500 text-[8px] font-bold mt-1 uppercase">Your Workspace</div>
        </td>
        <td class="p-6 text-slate-300 font-mono text-xs">${f.filename}</td>
        <td class="p-6 text-right flex justify-end gap-3">
            <a href="/download/${fullPath}" class="bg-emerald-600 px-4 py-2 rounded-lg text-[10px] font-black hover:bg-emerald-500 transition shadow-lg shadow-emerald-900/20">
                <i class="fa-solid fa-download mr-2"></i> Get Excel
            </a>
            <button onclick="deleteFile('${fullPath}')" class="bg-rose-950/30 text-rose-500 border border-rose-500/20 px-4 py-2 rounded-lg text-[10px] font-black hover:bg-rose-600 hover:text-white transition">
                <i class="fa-solid fa-trash-can"></i>
            </button>
        </td>`;
    tbody.appendChild(tr);
});
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="3" class="p-10 text-center text-rose-500 font-bold text-xs">Error connecting to Server</td></tr>`;
            }
        }

        async function deleteFile(path) {
            if (!confirm(`CAUTION: Permanently delete this file from Google Drive?\nPath: ${path}`)) return;

            try {
                const res = await fetch(`/delete/${path}`, { method: 'DELETE' });
                const result = await res.json();

                if (result.status === "success") {
                    load(); // Refresh list
                } else {
                    alert("Error: " + result.message);
                }
            } catch (e) {
                alert("Server error: Could not complete deletion.");
            }
        }

        function filterTable() {
            let input = document.getElementById("searchInput").value.toUpperCase();
            let rows = document.getElementById("list").getElementsByTagName("tr");
            for (let row of rows) {
                let text = row.textContent || row.innerText;
                row.style.display = text.toUpperCase().includes(input) ? "" : "none";
            }
        }

        // Initial Load
        load();
    </script>
</body>
</html>
